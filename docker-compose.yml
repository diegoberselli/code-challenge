x-airflow-common: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: CeleryExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://northwind_user:thewindisblowing@postgres/airflow
  AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://northwind_user:thewindisblowing@postgres/airflow
  AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
  AIRFLOW__CORE__FERNET_KEY: ''
  AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
  AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
  AIRFLOW_UID: "${AIRFLOW_UID:-50000}"

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: northwind_user
      POSTGRES_PASSWORD: thewindisblowing
      POSTGRES_DB: northwind
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
      - ./data/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - ./data/northwind.sql:/docker-entrypoint-initdb.d/02-northwind.sql
      - ./data:/opt/airflow/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "northwind_user", "-d", "northwind"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - pipeline_network

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    networks:
      - pipeline_network
  #retirar isso abaixo se não der boa
  docker-proxy:
    image: alpine/socat
    command: "TCP4-LISTEN:2375,fork,reuseaddr UNIX-CONNECT:/var/run/docker.sock"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - pipeline_network

  airflow-init:
    image: apache/airflow:2.10.3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    user: "${AIRFLOW_UID:-50000}:0"
    entrypoint: /bin/bash
    # Tirar o  pip install apache-airflow-providers-docker && \
    command:
      - -c
      - |
        airflow db init && \
        pip install apache-airflow-providers-docker && \
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com
    networks:
      - pipeline_network

  airflow-webserver:
    image: apache/airflow:2.10.3
    environment:
      <<: *airflow-common-env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./meltano:/opt/airflow/meltano  # Novo volume
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 30s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - pipeline_network

  airflow-scheduler:
    image: apache/airflow:2.10.3
    environment:
      <<: *airflow-common-env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./meltano:/opt/airflow/meltano  # Novo volume
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - pipeline_network

  airflow-worker:
    image: apache/airflow:2.10.3
    environment:
      <<: *airflow-common-env
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./data:/opt/airflow/data
      - ./meltano:/opt/airflow/meltano  # Novo volume
      - /var/run/docker.sock:/var/run/docker.sock  # Adiciona o Docker socket ao worker
    command: celery worker
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - pipeline_network

  meltano:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./meltano:/project
      - ./data:/data
    environment:
      - MELTANO_PROJECT_ROOT=/project
      - MELTANO_DATABASE_URI=postgresql://northwind_user:thewindisblowing@postgres/meltano
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pipeline_network

volumes:
  postgres-db-volume:

networks:
  pipeline_network:
    driver: bridge
